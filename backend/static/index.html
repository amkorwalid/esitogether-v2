<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESI Together – AI Assistant</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #1a56db;
      --primary-h: #1648c4;
      --bg:        #f0f4f8;
      --surface:   #ffffff;
      --sidebar:   #1e2a3b;
      --sidebar-t: #94a3b8;
      --user-bg:   #1a56db;
      --bot-bg:    #f1f5f9;
      --text:      #1e293b;
      --text-muted:#64748b;
      --border:    #e2e8f0;
      --radius:    12px;
      --shadow:    0 4px 16px rgba(0,0,0,.08);
    }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ──────────────────────────────────────────── */
    .sidebar {
      width: 240px;
      min-width: 240px;
      background: var(--sidebar);
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1rem;
      gap: 0.5rem;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0 0.5rem 1.25rem;
      border-bottom: 1px solid rgba(255,255,255,.08);
      margin-bottom: 0.5rem;
    }

    .sidebar-logo svg { flex-shrink: 0; }

    .sidebar-logo span {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -.2px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.65rem 0.75rem;
      border-radius: 8px;
      color: var(--sidebar-t);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background .15s, color .15s;
    }

    .nav-link:hover { background: rgba(255,255,255,.06); color: #fff; }
    .nav-link.active { background: var(--primary); color: #fff; }
    .nav-link svg { flex-shrink: 0; }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,.08);
      font-size: 0.75rem;
      color: var(--sidebar-t);
      text-align: center;
    }

    /* ── Main panel ───────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ──────────────────────────────────────────── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .topbar h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      margin-left: auto;
    }

    .status-label { font-size: 0.8rem; color: var(--text-muted); }

    /* ── Chat area ────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message-row {
      display: flex;
      gap: 0.75rem;
      max-width: 780px;
    }

    .message-row.user { align-self: flex-end; flex-direction: row-reverse; }
    .message-row.bot  { align-self: flex-start; }

    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .message-row.user .avatar { background: var(--primary); color: #fff; }
    .message-row.bot  .avatar { background: var(--bot-bg); color: var(--primary); border: 1px solid var(--border); }

    .bubble {
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      font-size: 0.9rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message-row.user .bubble {
      background: var(--primary);
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .message-row.bot .bubble {
      background: var(--bot-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }

    .message-row.bot.error .bubble { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }

    /* typing dots */
    .typing-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      margin: 0 2px;
      animation: bounce .9s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); }
    }

    /* ── Input bar ────────────────────────────────────────── */
    .input-bar {
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }

    #question {
      flex: 1;
      resize: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.65rem 1rem;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border .2s;
      max-height: 140px;
      line-height: 1.45;
    }

    #question:focus { border-color: var(--primary); }

    #send-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s;
    }
    #send-btn:hover:not(:disabled) { background: var(--primary-h); }
    #send-btn:disabled { opacity: .5; cursor: default; }

    /* welcome message */
    .welcome {
      text-align: center;
      margin: auto;
      color: var(--text-muted);
      padding: 2rem;
    }
    .welcome h2 { font-size: 1.2rem; color: var(--text); margin-bottom: 0.4rem; }
    .welcome p  { font-size: 0.88rem; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="7" fill="#1a56db"/>
        <path d="M7 20 L14 8 L21 20" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M10 16 H18" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>ESI Together</span>
    </div>

    <a class="nav-link active" href="/static/index.html">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      Chat
    </a>

    <a class="nav-link" href="/static/docs.html">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      Documents
    </a>

    <div class="sidebar-footer">School Administration AI</div>
  </aside>

  <!-- Main content -->
  <div class="main">
    <!-- Top bar -->
    <div class="topbar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <h1>AI Assistant</h1>
      <div class="status-dot"></div>
      <span class="status-label">Connected</span>
    </div>

    <!-- Messages -->
    <div id="messages">
      <div class="welcome">
        <h2>👋 Hello, how can I help you?</h2>
        <p>Ask me anything about school administration. I'll search the knowledge base for you.</p>
      </div>
    </div>

    <!-- Input -->
    <div class="input-bar">
      <textarea
        id="question"
        rows="1"
        placeholder="Type your question and press Enter…"
        autocomplete="off"
        aria-label="Chat message input"
      ></textarea>
      <button id="send-btn" title="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const messagesEl  = document.getElementById("messages");
    const questionEl  = document.getElementById("question");
    const sendBtn     = document.getElementById("send-btn");
    let welcomeShown  = true;

    /* ── Auto-resize textarea ───────────────────────────────── */
    questionEl.addEventListener("input", () => {
      questionEl.style.height = "auto";
      questionEl.style.height = Math.min(questionEl.scrollHeight, 140) + "px";
    });

    /* ── Append a message row ───────────────────────────────── */
    function appendMessage(text, role, isError = false) {
      if (welcomeShown) {
        messagesEl.innerHTML = "";
        welcomeShown = false;
      }

      const row = document.createElement("div");
      row.className = `message-row ${role}${isError ? " error" : ""}`;

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = role === "user" ? "🧑" : "🤖";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      row.appendChild(avatar);
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    /* ── Typing indicator ───────────────────────────────────── */
    function showTyping() {
      if (welcomeShown) { messagesEl.innerHTML = ""; welcomeShown = false; }
      const row = document.createElement("div");
      row.className = "message-row bot";
      row.id = "typing-row";

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = "🤖";

      const bubble = document.createElement("div");
      bubble.className = "bubble typing-dots";
      bubble.innerHTML = "<span></span><span></span><span></span>";

      row.appendChild(avatar);
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById("typing-row");
      if (el) el.remove();
    }

    /* ── Send question ──────────────────────────────────────── */
    async function sendQuestion() {
      const question = questionEl.value.trim();
      if (!question) return;

      appendMessage(question, "user");
      questionEl.value = "";
      questionEl.style.height = "auto";
      questionEl.focus();
      sendBtn.disabled = true;
      showTyping();

      try {
        const resp = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });

        removeTyping();

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${resp.status}`);
        }

        const data = await resp.json();
        appendMessage(data.answer, "bot");
      } catch (err) {
        removeTyping();
        appendMessage("Error: " + err.message, "bot", true);
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener("click", sendQuestion);
    questionEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendQuestion();
      }
    });
  </script>
</body>
</html>
